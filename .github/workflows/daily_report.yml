name: BVC Daily Report Scraper

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 4:00 PM (Hora Caracas ~ 20:00 UTC)
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # Permite ejecución manual para pruebas

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRÍTICO: Permite al bot hacer push de los cambios

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pdfplumber requests

      - name: Execute scraper
        run: python scripts/get_report.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/market_data.json
          # El '|| exit 0' evita que el workflow falle si no hay cambios en los datos
          git commit -m "Auto-update: BVC Market Data $(date +'%Y-%m-%d')" || exit 0
          git push
